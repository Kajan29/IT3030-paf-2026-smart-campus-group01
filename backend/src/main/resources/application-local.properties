# Local Development Configuration
server.port=${SERVER_PORT:8080}

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:zentaritas_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=${DB_AUTO_CREATE:true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Frontend URL (for email templates)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Admin Configuration (Auto-created on first run)
app.admin.email=${ADMIN_EMAIL:admin@zentaritas.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMeBeforeFirstRun!}
app.admin.firstname=${ADMIN_FIRSTNAME:System}
app.admin.lastname=${ADMIN_LASTNAME:Administrator}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ChangeThisJwtSecretToARealRandomValue}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Email Configuration (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Logging
logging.level.root=INFO
logging.level.com.zentaritas=DEBUG
logging.level.org.springframework.security=DEBUG
