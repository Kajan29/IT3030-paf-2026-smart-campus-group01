# Local Development Configuration
server.port=${SERVER_PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zentaritas_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Frontend URL (for email templates)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Admin Configuration (Auto-created on first run)
app.admin.email=${ADMIN_EMAIL:admin@smartcampus.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMeBeforeFirstRun!}
app.admin.firstname=${ADMIN_FIRSTNAME:System}
app.admin.lastname=${ADMIN_LASTNAME:Administrator}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ChangeThisJwtSecretToARealRandomValue}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:${JWT_EXPIRATION:86400000}}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}
app.jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:refresh_token}
app.jwt.refresh-cookie-max-age-days=${JWT_REFRESH_COOKIE_MAX_AGE_DAYS:${JWT_REFRESH_EXPIRATION_DAYS:7}}
app.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:false}
app.jwt.refresh-cookie-same-site=${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

# Email Configuration (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
app.auth.google.allowed-client-ids=${GOOGLE_ALLOWED_CLIENT_IDS:${GOOGLE_CLIENT_ID:}}

# Multipart upload limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:6MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}

# Logging
logging.level.root=INFO
logging.level.com.zentaritas=DEBUG
logging.level.org.springframework.security=DEBUG
