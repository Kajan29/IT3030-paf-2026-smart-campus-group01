# Server Configuration
server.port=${SERVER_PORT:8080}

# Application Name
spring.application.name=zentaritas

# Active Profile
spring.profiles.active=local

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:zentaritas_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Frontend URL (for email templates)
app.frontend.url=${FRONTEND_URL}

# Admin Configuration (for auto-creation on startup)
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.firstname=${ADMIN_FIRSTNAME}
app.admin.lastname=${ADMIN_LASTNAME}

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:${JWT_EXPIRATION}}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}
app.jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME:refresh_token}
app.jwt.refresh-cookie-max-age-days=${JWT_REFRESH_COOKIE_MAX_AGE_DAYS:${JWT_REFRESH_EXPIRATION_DAYS:7}}
app.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:true}
app.jwt.refresh-cookie-same-site=${JWT_REFRESH_COOKIE_SAME_SITE:None}

# Email Configuration (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Logging
logging.level.root=INFO
logging.level.com.zentaritas=DEBUG
logging.level.org.springframework.security=DEBUG
